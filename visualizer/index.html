<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFS Pathfinder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="controls">
    <strong>BFS Pathfinder</strong>

    <label>Rows <input type="number" id="rows" value="20" min="2" max="80"></label>
    <label>Cols <input type="number" id="cols" value="30" min="2" max="80"></label>
    <button id="btn-new-grid">New Grid</button>

    <span class="sep"></span>

    <label>Walls <input type="range" id="wall-density" min="0" max="50" value="25"><span id="wall-density-val">25%</span></label>
    <button id="btn-random-walls">Random Walls</button>
    <button id="btn-clear-walls">Clear Walls</button>

    <span class="sep"></span>

    <label>Mode
      <select id="mode">
        <option value="wall">Draw Wall</option>
        <option value="erase">Erase</option>
        <option value="start">Place Start</option>
        <option value="end">Place End</option>
      </select>
    </label>

    <span class="sep"></span>

    <label>Speed <input type="range" id="speed" min="1" max="100" value="50"></label>
    <button id="btn-run" class="primary">Run BFS</button>
    <button id="btn-reset">Reset</button>

    <span class="sep"></span>

    <span id="status">Ready</span>
  </div>

  <canvas id="grid-canvas"></canvas>

  <script type="module" src="app.js"></script>
</body>
</html>
